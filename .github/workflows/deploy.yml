name: Build Verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    # --- JAUNAIS SOLIS: Sagatavojam PHP un Composer ---
    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3' # Atbilst tavam serverim
        tools: composer:v2

    - name: 📥 Install Composer Dependencies
      working-directory: darttrainer
      run: composer install --no-progress --no-interaction --prefer-dist
    # --------------------------------------------------

    - name: 🟢 Setup Node.js (Node 24)
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: 🛠️ Install NPM Dependencies
      working-directory: darttrainer
      run: npm install

    - name: 🔬 Type-Check & Lint
      working-directory: darttrainer
      run: npm run lint --if-present

    - name: 📦 Compile Assets (Vite Build)
      working-directory: darttrainer
      run: npm run build
name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  # Izslēdzam pull_request deployu, lai kods nesūtītos uz serveri pirms laika, kad kāds tikai taisa PR
  
jobs:
  build-and-deploy:
    name: Build Frontend & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer:v2

    - name: 📥 Install Composer Dependencies
      working-directory: darttrainer
      run: composer install --no-progress --no-interaction --prefer-dist --ignore-platform-reqs

    - name: 🟢 Setup Node.js (Node 24)
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: 🛠️ Install NPM Dependencies
      working-directory: darttrainer
      run: npm install

    - name: 🔬 Type-Check & Lint
      working-directory: darttrainer
      run: npm run lint --if-present

    - name: 📦 Compile Assets (Vite Build)
      working-directory: darttrainer
      run: npm run build

    - name: ⚙️ Install SSH Key (Automātiskā formāta labošana)
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: "unnecessary_because_we_ignore_it" # šo ignorēsim nākamajā solī
        if_key_exists: replace

    - name: 🚚 Deploy via Native Rsync to cPanel
      run: |
        # 1. Noteicam portu
        PORT="${{ secrets.SSH_PORT }}"
        if [ -z "$PORT" ]; then
          PORT="722"
        fi
        
        # 2. Viens tīrs un elegants Rsync uz projekta mapi
        rsync -az --stats -e "ssh -i ~/.ssh/id_ed25519 -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
          --exclude='node_modules' \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='.env' \
          ./darttrainer/ traindar@${{ secrets.SSH_HOST }}:/home/traindar/public_html/darttrainer/darttrainer/

    - name: 🧹 Clear & rebuild Laravel cache on server
      run: |
        PORT="${{ secrets.SSH_PORT }}"
        if [ -z "$PORT" ]; then
          PORT="722"
        fi

        ssh -i ~/.ssh/id_ed25519 -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          traindar@${{ secrets.SSH_HOST }} \
          "cd /home/traindar/public_html/darttrainer/darttrainer && php artisan optimize:clear"
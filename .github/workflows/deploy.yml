name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  # Izslēdzam pull_request deployu, lai kods nesūtītos uz serveri pirms laika, kad kāds tikai taisa PR
  
jobs:
  build-and-deploy:
    name: Build Frontend & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer:v2

    - name: 📥 Install Composer Dependencies
      working-directory: darttrainer
      run: composer install --no-progress --no-interaction --prefer-dist --ignore-platform-reqs

    - name: 🟢 Setup Node.js (Node 24)
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: 🛠️ Install NPM Dependencies
      working-directory: darttrainer
      run: npm install

    - name: 🔬 Type-Check & Lint
      working-directory: darttrainer
      run: npm run lint --if-present

    - name: 📦 Compile Assets (Vite Build)
      working-directory: darttrainer
      run: npm run build

    - name: 🚚 Deploy via Native Rsync to cPanel
      run: |
        # 1. Sagatavojam SSH vidi ar tavu cPanel atslēgu
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # 2. Pievienojam serveri uzticamajiem saimniekiem (known_hosts)
        ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
        
        # 3. Rsync komanda.
        # Ievēro, ka sūtam saturu TIKAI no ./darttrainer/ mapes, kur viss tikko uzbūvējās,
        # un izlaižam node_modules, lai nav jāsūta gigabaiti ar liekiem failiem.
        rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" \
          --exclude='node_modules' \
          --exclude='.git' \
          --exclude='.github' \
          ./darttrainer/ traindar@${{ secrets.SSH_HOST }}:/home/traindar/public_html/darttrainer/darttrainer/
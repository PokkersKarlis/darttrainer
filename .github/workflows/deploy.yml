# Uzbūvē Vite izeju GitHub (pietiekami RAM) un izvieto tikai public/build/ uz Krystal/CloudLinux caur FTP.
# Nepieciešams: Settings → Secrets and variables → Actions → (FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_SERVER_DIR).
# Izvietojums no push: Settings → Variables → New repository variable → FTP_DEPLOY = true
name: Deploy frontend to hosting (Vite + FTP)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'darttrainer/package.json'
      - 'darttrainer/package-lock.json'
      - 'darttrainer/vite.config.js'
      - 'darttrainer/postcss.config.js'
      - 'darttrainer/tailwind.config.js'
      - 'darttrainer/resources/js/**'
      - 'darttrainer/resources/css/**'
      - 'darttrainer/resources/views/**'

concurrency:
  group: deploy-ftp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && vars.FTP_DEPLOY == 'true')
    permissions:
      contents: read
    defaults:
      run:
        working-directory: darttrainer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: darttrainer/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Deploy public/build to hosting (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Rīks prasa ceļu ar beigu slīpsvītru. Lokāli: Vite izeja (no repo saknes).
          local-dir: ./darttrainer/public/build/
          # Pēc FTP login: remote mape līdzīga failu pārvaldnieka public/build (PĒC PĀRBAUDES, ka ceļš pareizs; dangerous-clean-slate izdzēš visu šajā mapē)
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: true
          # Ja Krystal prasa šifrētu FTP: atver PR ar protocol: ftps  vai ftps-legacy, port: 21

      - name: Izvietošanas atgādinājums
        if: always()
        run: |
          {
            echo '## Pēc deploy'
            echo 'Pārbaudi lapu. Ja production paliek public/hot, dzēs to servera public/ mapē.'
            echo 'Noslēpumam FTP_SERVER_DIR jābeidzas ar / un jānorāda tieši public/build, ko redzi cPanel (ne visu public/).'
          } >> "$GITHUB_STEP_SUMMARY"

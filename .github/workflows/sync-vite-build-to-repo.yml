# Uzbūvē Vite un iesaista darttrainer/public/build repozitorijā, lai serverī pietiek ar git pull.
# Commit ziņojumā [skip ci] — otrs push nenoņem citus workflow dubultā (sk. GitHub docs).
# Ja main ir aizsargāts: Settings → Branches — ļaujiet github-actions[bot] push (vai izmantojiet branch rule exception).
name: Sync Vite build into repo

on:
  push:
    branches: [main]
    paths:
      - 'darttrainer/package.json'
      - 'darttrainer/package-lock.json'
      - 'darttrainer/vite.config.js'
      - 'darttrainer/postcss.config.js'
      - 'darttrainer/tailwind.config.js'
      - 'darttrainer/resources/js/**'
      - 'darttrainer/resources/css/**'
      - 'darttrainer/resources/views/**'
  workflow_dispatch:

concurrency:
  group: sync-vite-build
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: darttrainer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: darttrainer/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Commit public/build if changed
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f darttrainer/public/build
          if git diff --staged --quiet; then
            echo "No changes under public/build"
            exit 0
          fi
          git commit -m "chore: sync Vite public/build [skip ci]"
          git push

# CloudLinux / cPanel: jēdzīgi `npm run build` bieži krīt ar WASM/undici OOM. Uz servera
# nebūvē: šeit uzbūvē, lejupielādē artifact un augšupielādē tikai `public/build/`.
name: Build frontend (Vite)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'darttrainer/package.json'
      - 'darttrainer/package-lock.json'
      - 'darttrainer/vite.config.js'
      - 'darttrainer/postcss.config.js'
      - 'darttrainer/tailwind.config.js'
      - 'darttrainer/resources/js/**'
      - 'darttrainer/resources/css/**'
      - 'darttrainer/resources/views/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: darttrainer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: darttrainer/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Augšupielādes norāde (cPanel / FTP)
        run: |
          {
            echo '## Pēc build'
            echo '1. Sadaļā **Actions** atver šo run → **Artifacts** → lejupielādē **darttrainer-public-build** (zip).'
            echo '2. Izpako un to, kas iekš zip, ievieto servera public/build/ (aizstāj veco build/ mapi).'
            echo '3. Pārliecinies, ka public/hot nav production vidē (dzēs, ja ir).'
            echo ''
            echo '*Uz kopīga CloudLinux hostinga Vite bieži nedarbojas (WASM atmiņa, LVE). Tāpēc šis workflow ir ieteicamais veids.*'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: darttrainer-public-build
          path: darttrainer/public/build
          if-no-files-found: error
          retention-days: 14

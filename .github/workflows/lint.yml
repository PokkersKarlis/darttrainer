name: lint

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: darttrainer/package-lock.json

      - name: Install PHP dependencies
        working-directory: darttrainer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        working-directory: darttrainer
        run: npm ci

      - name: PHP code style (Pint)
        working-directory: darttrainer
        run: ./vendor/bin/pint --test

      - name: Prettier (formatēšanas pārbaude)
        working-directory: darttrainer
        run: npm run format:check

      - name: ESLint
        working-directory: darttrainer
        run: npx eslint .

      - name: TypeScript tipu pārbaude
        working-directory: darttrainer
        run: npx vue-tsc --noEmit

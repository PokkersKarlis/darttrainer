# Automātiski iesniedz PR ar atkarību atjauninājumiem. Apvieno un palaisi testus.
version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/darttrainer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/darttrainer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

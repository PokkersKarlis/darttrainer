server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    # "/" — Laravel Blade + Vite SPA; public/index.html novirza uz /
    index index.php;

    charset utf-8;

    # Vite-only SPA build (public/dart-app). Vajag SPA fallback, citādi nginx dod 403 uz direktorijas `/dart-app/`.
    location ^~ /dart-app/ {
        # NB: neliekam `$uri/`, jo direktorija `/dart-app/` eksistē un nginx mēģina atdot directory listing (403).
        try_files $uri /dart-app/index.html;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

}

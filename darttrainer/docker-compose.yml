services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: traindart-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - traindart-network
  webserver:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - traindart-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: traindart
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret_password
      MYSQL_ROOT_PASSWORD: root_secret_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - traindart-network

  # db-postgres:
  #   image: postgres:15-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_DB: traindart
  #     POSTGRES_USER: laravel
  #     POSTGRES_PASSWORD: secret_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     # in future pg_partman... connectiomn goes here
  #   networks:
  #     - traindart-network

  node:
    image: node:20-alpine
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host
    networks:
      - traindart-network

networks:
  traindart-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  # postgres_data:
  #   driver: local
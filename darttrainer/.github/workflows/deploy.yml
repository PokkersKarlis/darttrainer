name: Build Verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # Automātiski kešos node_modules paātrināšanai

    - name: 🛠️ Install Dependencies
      run: npm ci

    - name: 🔬 Type-Check & Lint
      run: npm run lint --if-present

    - name: 📦 Compile Assets (Vite Build)
      run: npm run build 
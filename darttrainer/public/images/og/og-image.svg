<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ogTitle ogDesc">
  <title id="ogTitle">DartTrainer</title>
  <desc id="ogDesc">Train. Play. Win.  darts web app</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1c30"/>
      <stop offset="0.5" stop-color="#060d18"/>
      <stop offset="1" stop-color="#0a1120"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)" opacity="0.9"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold)" opacity="0.6"/>
  <circle cx="180" cy="200" r="6" fill="#f59e0b" opacity="0.35"/>
  <circle cx="1020" cy="450" r="8" fill="#f59e0b" opacity="0.25"/>
  <circle cx="1000" cy="120" r="4" fill="#64748b" opacity="0.4"/>
  <text x="120" y="300" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="86" font-weight="800" fill="url(#gold)" filter="url(#glow)">DartTrainer</text>
  <text x="120" y="400" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="600" fill="#94a3b8" letter-spacing="0.12em" text-transform="uppercase">Train · Play · Win</text>
  <text x="120" y="470" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#64748b" max-width="900">Multiplayer 501 &amp; Cricket · X01 solo · stats &amp; friends</text>
  <g transform="translate(920 260)">
    <circle r="100" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.5"/>
    <circle r="70" fill="none" stroke="#1e3050" stroke-width="2" opacity="0.9"/>
    <circle r="6" cy="-55" fill="#f59e0b" opacity="0.9"/>
    <line x1="0" y1="0" x2="45" y2="-32" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>

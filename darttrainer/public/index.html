  <style>
    *, *::before, *::after { box-sizing: border-box; }

    [v-cloak] { display: none; }

    /* ── Animations ─────────────────────────────────────── */
    .fade-enter-active, .fade-leave-active { transition: opacity .12s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    /* Achievement toast */
    .achieve-enter-active { animation: achieve-in .35s cubic-bezier(.34,1.56,.64,1); }
    .achieve-leave-active { animation: achieve-out .25s ease-in forwards; }
    @keyframes achieve-in {
      from { opacity:0; transform: translateX(-50%) translateY(-20px) scale(.7); }
      to   { opacity:1; transform: translateX(-50%) translateY(0)      scale(1); }
    }
    @keyframes achieve-out {
      from { opacity:1; transform: translateX(-50%) translateY(0)    scale(1); }
      to   { opacity:0; transform: translateX(-50%) translateY(-12px) scale(.85); }
    }

    @keyframes mark-pop {
      0%   { transform: scale(0.2) rotate(-20deg); opacity: 0; }
      65%  { transform: scale(1.25) rotate(6deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes mark-close {
      0%   { transform: scale(0.5); opacity: 0; }
      50%  { transform: scale(1.4); }
      75%  { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* X01 punktu līmeņi */
    @keyframes dt-x01-tier-95 {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    .dt-x01-tier-95 { animation: dt-x01-tier-95 0.5s ease-in-out 2; }
    @keyframes dt-x01-tier-100 {
      0%, 100% { transform: scale(1); }
      35% { transform: scale(1.1); }
      65% { transform: scale(1.03); }
    }
    .dt-x01-tier-100 { animation: dt-x01-tier-100 0.48s cubic-bezier(0.34, 1.35, 0.64, 1) 3; }
    @keyframes dt-x01-tier-140 {
      0%, 100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      25% { transform: scale(1.12) rotate(-1deg); filter: brightness(1.12); }
      50% { transform: scale(1.08) rotate(1deg); filter: brightness(1.08); }
      75% { transform: scale(1.1) rotate(0deg); filter: brightness(1.15); }
    }
    .dt-x01-tier-140 { animation: dt-x01-tier-140 0.55s ease-in-out 3; }
    @keyframes dt-x01-tier-180 {
      0% { transform: scale(0.85); filter: brightness(0.9); }
      20% { transform: scale(1.18); filter: brightness(1.25); }
      40% { transform: scale(1.05); }
      60% { transform: scale(1.14); filter: brightness(1.2); }
      80% { transform: scale(1.06); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .dt-x01-tier-180 { animation: dt-x01-tier-180 0.65s cubic-bezier(0.34, 1.45, 0.64, 1) 2; }
    @keyframes dt-x01-co-pop {
      0% { transform: scale(0.92); opacity: 0.85; }
      45% { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .dt-x01-co-pop { animation: dt-x01-co-pop 0.45s ease-out 2; }
    @keyframes dt-leg-won {
      0% { transform: translateX(-50%) scale(0.75); opacity: 0; }
      55% { transform: translateX(-50%) scale(1.05); opacity: 1; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }
    .dt-leg-won-enter { animation: dt-leg-won 0.55s cubic-bezier(0.34, 1.4, 0.64, 1) both; }
    @keyframes dt-x01-bust {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-10px); }
      30% { transform: translateX(10px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }
    .dt-x01-toast-bust {
      animation: dt-x01-bust 0.42s ease-in-out 2;
    }
    @keyframes dt-x01-miss {
      0%, 100% { opacity: 1; transform: scale(1); filter: grayscale(0); }
      40% { opacity: 0.55; transform: scale(0.92); filter: grayscale(0.4); }
      70% { opacity: 0.85; transform: scale(0.98); }
    }
    .dt-x01-toast-miss {
      animation: dt-x01-miss 0.65s ease-in-out 3;
    }
    .mark-enter-active { animation: mark-pop 0.32s cubic-bezier(0.34,1.56,0.64,1) both; }
    .mark-leave-active { transition: all .1s ease-in; }
    .mark-leave-to     { opacity: 0; transform: scale(0.4); }
    .mark-close-anim   { animation: mark-close 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }

    @keyframes seg-flash {
      0%, 100% { background: transparent; }
      30%      { background: rgba(16,185,129,.22); }
    }
    .seg-closed-flash { animation: seg-flash 0.5s ease-out; }

    /* ── Shell layout ───────────────────────────────────── */
    html, body { height: 100%; margin: 0; }

    body {
      background: #060d18;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ad placeholders ────────────────────────────────── */
    .ad-slot {
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 8px,
        rgba(255,255,255,0.035) 8px, rgba(255,255,255,0.035) 16px
      );
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: rgba(255,255,255,0.18);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      user-select: none;
    }

    /* ── Scrollbars ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e3050; border-radius: 4px; }

    /* ── Top header: šaurie ekrāni (logo + valoda + auth bez pārgriešanas) ── */
    .app-shell-header {
      box-sizing: border-box;
    }
    @media (max-width: 639px) {
      .app-shell-header {
        padding-left: 8px !important;
        padding-right: 8px !important;
        gap: 6px !important;
      }
      .dt-header-logo img {
        max-height: 34px !important;
        max-width: 82px !important;
      }
      .app-shell-header .dt-header-lang {
        gap: 2px !important;
        margin-right: 0 !important;
        flex-shrink: 0;
      }
      .app-shell-header .dt-header-lang button {
        padding: 4px 6px !important;
        font-size: 10px !important;
      }
      .app-shell-header .dt-header-auth {
        min-width: 0 !important;
        flex: 0 1 auto;
        gap: 6px !important;
      }
      .app-shell-header .dt-header-auth a.dt-header-register {
        font-size: 11px !important;
        font-weight: 700 !important;
        padding: 5px 8px !important;
      }
      .app-shell-header .dt-header-auth a.dt-header-login {
        font-size: 11px !important;
        padding: 4px 6px !important;
      }
    }

    /* ── Login / Register: mobilā bez liekas ritināšanas; centrēta iesniegšanas poga ── */
    .dt-auth-page {
      flex: 1;
      min-height: 0;
      width: 100%;
      box-sizing: border-box;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(16px, 3vh, 28px) 20px max(28px, env(safe-area-inset-bottom, 0px));
    }
    .dt-auth-page-inner {
      width: 100%;
      max-width: 380px;
      flex-shrink: 0;
    }
    @media (max-width: 639px) {
      .dt-auth-page {
        padding: 8px 14px calc(10px + env(safe-area-inset-bottom, 0px));
        justify-content: center;
      }
      .dt-auth-brand {
        margin-bottom: 10px !important;
      }
      .dt-auth-emoji {
        font-size: 28px !important;
        margin-bottom: 2px !important;
        line-height: 1;
        display: block;
      }
      .dt-auth-brand h1 {
        font-size: 17px !important;
        line-height: 1.2;
        margin: 0 0 2px !important;
      }
      .dt-auth-sub {
        font-size: 11px !important;
        line-height: 1.3;
        margin: 0 !important;
      }
      .dt-auth-card {
        padding: 14px 14px !important;
        border-radius: 12px !important;
      }
      .dt-auth-card input {
        padding: 9px 11px !important;
        font-size: 14px !important;
      }
      .dt-auth-label {
        font-size: 10px !important;
        margin-bottom: 4px !important;
      }
      .dt-auth-field {
        margin-bottom: 10px !important;
      }
      .dt-auth-field:last-child {
        margin-bottom: 0 !important;
      }
      .dt-auth-account-row {
        margin-bottom: 10px !important;
      }
      .dt-auth-account-row .acct-pill {
        padding: 8px 6px !important;
        font-size: 12px !important;
        border-radius: 10px !important;
      }
      .dt-auth-club-box {
        padding: 8px 10px !important;
        margin-bottom: 10px !important;
        border-radius: 10px !important;
      }
      .dt-auth-club-box .dt-auth-club-hint {
        font-size: 10px !important;
        line-height: 1.35 !important;
        margin: 0 0 8px !important;
      }
      .dt-auth-fields {
        gap: 8px !important;
        margin-bottom: 10px !important;
      }
      .dt-auth-err {
        padding: 8px 10px !important;
        font-size: 11px !important;
        margin-bottom: 10px !important;
      }
      .dt-auth-submit-row {
        display: flex;
        justify-content: center;
        width: 100%;
      }
      .dt-auth-submit-row button {
        width: auto !important;
        min-width: 11.5rem;
      }
      .dt-auth-footer {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        margin-top: 10px !important;
        font-size: 12px !important;
        text-align: center;
        line-height: 1.35;
      }
    }

    /* Login / register mobilajā: fiksēts header + apakšējā nav; vidus bez ritināšanas */
    @media (max-width: 1023px) {
      body.dt-route-auth .dt-shell-mobile-ad {
        display: none !important;
      }
      body.dt-route-auth .app-shell-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        padding-top: env(safe-area-inset-top, 0px);
        min-height: calc(56px + env(safe-area-inset-top, 0px));
        height: auto;
        box-sizing: border-box;
      }
      body.dt-route-auth .dt-app-shell-body {
        padding-top: calc(56px + env(safe-area-inset-top, 0px));
        padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
        box-sizing: border-box;
      }
      body.dt-route-auth .dt-shell-mobile-bnav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 50;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        min-height: 60px;
        height: auto;
        box-sizing: border-box;
        justify-content: center !important;
        gap: 12px !important;
        padding-left: 12px !important;
        padding-right: 12px !important;
      }
      body.dt-route-auth .dt-shell-mobile-bnav .bnav-item {
        flex: 0 1 auto !important;
        min-width: 0;
        max-width: 11rem;
        padding-left: 10px;
        padding-right: 10px;
      }
      body.dt-route-auth .shell-main-scroll {
        overflow: hidden !important;
      }
      body.dt-route-auth .shell-main-scroll-inner {
        overflow: hidden !important;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      body.dt-route-auth .shell-router-outlet {
        flex: 1 1 0;
        min-height: 0;
        overflow: hidden !important;
        display: flex;
        flex-direction: column;
      }
      body.dt-route-auth .dt-auth-page {
        overflow: hidden !important;
        flex: 1 1 0;
        min-height: 0;
        -webkit-overflow-scrolling: auto;
        justify-content: center;
        padding: 6px 14px;
        box-sizing: border-box;
      }
    }

    /* ── Sidebar nav link ───────────────────────────────── */
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px;
      font-size: 13.5px; font-weight: 500;
      color: #94a3b8;
      transition: background .15s, color .15s;
      text-decoration: none;
    }
    .nav-link:hover { background: rgba(255,255,255,0.07); color: #f1f5f9; }
    .nav-link .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

    .nav-link--disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
      color: #64748b !important;
    }
    .nav-link--soon { font-size: 9px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #475569; margin-left: auto; }

    .nav-card--locked {
      opacity: 0.42;
      cursor: not-allowed;
      filter: grayscale(0.2);
    }

    /* ── Mobile bottom nav ──────────────────────────────── */
    .bnav-item {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; flex: 1;
      font-size: 10px; font-weight: 600; letter-spacing: .03em;
      color: #64748b; text-decoration: none;
      transition: color .15s;
      padding: 6px 0;
    }
    .bnav-item:hover, .bnav-item.active { color: #f59e0b; }
    .bnav-item .bicon { font-size: 20px; line-height: 1; }
    .bnav-item--disabled {
      opacity: 0.38;
      cursor: not-allowed;
      pointer-events: none;
      color: #475569 !important;
    }
    .bnav-soon { font-size: 7px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #475569; line-height: 1.1; margin-top: 1px; }

    /* Lobby: fill main column, no page scroll (content stays in one viewport band) */
    body.body--lobby-shell .shell-main-scroll {
      overflow: hidden !important;
      display: flex;
      flex-direction: column;
    }
    body.body--lobby-shell .shell-main-scroll-inner {
      flex: 1 1 0;
      min-height: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    body.body--lobby-shell .shell-router-outlet {
      flex: 1 1 0;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Spēle: pilns augstums kolonnā (bez liekas lapas ritināšanas) */
    body.body--game-shell .shell-main-scroll {
      overflow: hidden !important;
      display: flex;
      flex-direction: column;
    }
    /* Pārspiež inline min-height:min-content — citādi kolonna izaug ar protokolu un ritina «zem» */
    body.body--game-shell .shell-main-scroll-inner {
      flex: 1 1 0;
      min-height: 0 !important;
      min-width: 0;
      height: 100% !important;
      max-height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    body.body--game-shell .shell-router-outlet {
      flex: 1 1 0;
      min-height: 0 !important;
      height: 100% !important;
      max-height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Spēle mobilajā: vairāk vietas laukumam — slēpj globālo header, reklāmas joslu un apakšējo nav */
    @media (max-width: 1023px) {
      body.body--game-shell .app-shell-header,
      body.body--game-shell .dt-shell-mobile-ad,
      body.body--game-shell .dt-shell-mobile-bnav {
        display: none !important;
      }
    }
    @media (max-height: 720px) {
      .lobby-compact .lobby-play-desc { display: none !important; }
      .lobby-compact .lobby-cricket-longdesc { display: none !important; }
    }

    .lobby-details-summary::-webkit-details-marker { display: none; }
    .lobby-details-summary { list-style: none; }

  </style>
</head>

<body>
<div id="app" v-cloak style="height:100dvh;display:flex;flex-direction:column;overflow:hidden">

  <app-shell-header />
  <email-verify-banner v-if="needsEmailVerify" :resend-busy="resendBusy" @resend="resendVerification" />

  <div class="dt-app-shell-body" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
    <app-shell-body />
    <app-shell-footer />
  </div>

  <friends-incoming-modal />

  <!-- ══════════════════════════════════════════════════════════
       TOAST NOTIFICATIONS
  ══════════════════════════════════════════════════════════ -->
  <div style="position:fixed;bottom:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px"
       class="lg:bottom-4">
    <transition-group name="fade">
      <div v-for="toast in toasts" :key="toast.id"
           :style="toast.type === 'error' ? 'background:#dc2626' : 'background:#059669'"
           style="padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.4);max-width:280px">
        {{ toast.message }}
      </div>
    </transition-group>
  </div>

</div>

<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DartTrainer</title>
  <!-- SPA uzbūvēts ar Vite: resources/js/dart-app/main.vue → Blade dart-spa, nevis šis fails -->
  <meta http-equiv="refresh" content="0; url=/">
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      max-width: 36rem;
      margin: auto;
      background: #0a1120;
      color: #e2e8f0;
      line-height: 1.5;
    }
    a { color: #fbbf24; }
    code { font-size: 0.9em; color: #94a3b8; }
  </style>
</head>
<body>
  <p>
    DartTrainer SPA tiek piegādāts caur Laravel un
    <strong>Vite</strong> (<code>@vite('resources/js/dart-app/main.vue')</code> uz <code>/</code>).
  </p>
  <p>Novirzīšana uz sākumlapu… Ja nē, <a href="/">atver šeit</a>.</p>
  <script>
    (function () {
      var origin = window.location.origin;
      var u;
      try {
        u = new URL(window.location.href);
      } catch (e) {
        location.replace('/');
        return;
      }
      if (u.origin !== origin) {
        location.replace('/');
        return;
      }
      var h = u.hash;
      if (h.indexOf('#/') === 0) {
        var rel = h.slice(1);
        try {
          var dest = new URL(rel, origin + '/');
          if (dest.origin === origin) {
            location.replace(dest.pathname + dest.search + (dest.hash || ''));
            return;
          }
        } catch (e2) {
        }
        location.replace('/');
        return;
      }
      var out = new URL('/', origin);
      out.search = u.search;
      out.hash = u.hash;
      location.replace(out.pathname + out.search + out.hash);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DartTrainer</title>
  <!-- SPA uzbūvēts ar Vite: resources/js/dart-app/main.vue → Blade dart-spa, nevis šis fails -->
  <meta http-equiv="refresh" content="0; url=/">
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      max-width: 36rem;
      margin: auto;
      background: #0a1120;
      color: #e2e8f0;
      line-height: 1.5;
    }
    a { color: #fbbf24; }
    code { font-size: 0.9em; color: #94a3b8; }
  </style>
</head>
<body>
  <p>
    DartTrainer SPA tiek piegādāts caur Laravel un
    <strong>Vite</strong> (<code>@vite('resources/js/dart-app/main.vue')</code> uz <code>/</code>).
  </p>
  <p>Novirzīšana uz sākumlapu… Ja nē, <a href="/">atver šeit</a>.</p>
  <script>
    (function () {
      var q = location.search || '';
      var h = location.hash || '';
      if (h.indexOf('#/') === 0) {
        location.replace(h.slice(1) + q);
        return;
      }
      location.replace('/' + q + h);
    })();
  </script>
</body>
</html>
